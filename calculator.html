<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precision Calc | Sabra Akhtar Portfolio</title>
    <style>
        :root {
            --primary: #E63946;
            --bg: #0f172a;
            --btn-dark: #1e293b;
            --btn-light: #334155;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .calculator {
            background-color: #000000;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 320px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Display Screen */
        .screen {
            width: 100%;
            height: 80px;
            background: transparent;
            color: var(--white);
            font-size: 2.5rem;
            text-align: right;
            border: none;
            outline: none;
            margin-bottom: 20px;
            padding: 10px;
            box-sizing: border-box;
        }

        /* Button Grid */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            height: 60px;
            border-radius: 12px;
            border: none;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--white);
        }

        .btn-gray { background-color: var(--btn-light); }
        .btn-dark { background-color: var(--btn-dark); }
        .btn-red { background-color: var(--primary); }

        button:hover {
            opacity: 0.8;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .span-two {
            grid-column: span 2;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <input type="text" class="screen" id="result" value="0" disabled>
        
        <div class="buttons">
            <button class="btn-gray span-two" onclick="clearScreen()">AC</button>
            <button class="btn-gray" onclick="deleteLast()">DEL</button>
            <button class="btn-red" onclick="appendValue('/')">÷</button>
            
            <button class="btn-dark" onclick="appendValue('7')">7</button>
            <button class="btn-dark" onclick="appendValue('8')">8</button>
            <button class="btn-dark" onclick="appendValue('9')">9</button>
            <button class="btn-red" onclick="appendValue('*')">×</button>
            
            <button class="btn-dark" onclick="appendValue('4')">4</button>
            <button class="btn-dark" onclick="appendValue('5')">5</button>
            <button class="btn-dark" onclick="appendValue('6')">6</button>
            <button class="btn-red" onclick="appendValue('-')">−</button>
            
            <button class="btn-dark" onclick="appendValue('1')">1</button>
            <button class="btn-dark" onclick="appendValue('2')">2</button>
            <button class="btn-dark" onclick="appendValue('3')">3</button>
            <button class="btn-red" onclick="appendValue('+')">+</button>
            
            <button class="btn-dark span-two" onclick="appendValue('0')">0</button>
            <button class="btn-dark" onclick="appendValue('.')">.</button>
            <button class="btn-red" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        let screen = document.getElementById('result');

        function appendValue(value) {
            if (screen.value === "0") {
                screen.value = value;
            } else {
                screen.value += value;
            }
        }

        function clearScreen() {
            screen.value = "0";
        }

        function deleteLast() {
            screen.value = screen.value.slice(0, -1);
            if (screen.value === "") screen.value = "0";
        }

        function calculate() {
            try {
                // Using eval safely for a simple calculator logic
                screen.value = eval(screen.value);
            } catch (error) {
                screen.value = "Error";
                setTimeout(clearScreen, 1500);
            }
        }
    </script>
</body>
</html>
